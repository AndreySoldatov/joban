name: Security SAST

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Python scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep

      - name: Install frontend dependencies
        working-directory: Frontend
        run: |
          npm ci
          npm install --no-save eslint-plugin-security eslint-plugin-no-secrets

      - name: Create reports directory
        run: |
          mkdir -p reports
          chmod 0777 reports

      - name: Run Bandit
        run: |
          bandit \
            -r Backend/app \
            -x Backend/app/tests \
            -f json \
            -o reports/bandit.json \
            --exit-zero

      - name: Run ESLint security scan
        working-directory: Frontend
        run: |
          set +e
          npx eslint \
            --config eslint.security.config.js \
            --format json \
            --output-file ../reports/eslint.json \
            "src/**/*.{ts,tsx}"
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --json \
            --output reports/semgrep.json \
            --exclude '**/.venv/**' \
            --exclude '**/node_modules/**' \
            --exclude '**/.vite/**' \
            --exclude '**/dist/**' \
            --exclude '**/tests/**' \
            Backend/app \
            Frontend/src

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: reports/
          if-no-files-found: error

  sca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Trivy backend dependency scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: Backend
          scanners: vuln
          vuln-type: library
          format: json
          output: reports/trivy-backend-fs.json
          exit-code: "0"

      - name: Run Trivy frontend dependency scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: Frontend
          scanners: vuln
          vuln-type: library
          format: json
          output: reports/trivy-frontend-fs.json
          exit-code: "0"
          skip-setup-trivy: true

      - name: Upload SCA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: reports/trivy-*.json
          if-no-files-found: error

  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - name: Create reports directory
        run: |
          mkdir -p reports
          chmod 0777 reports

      - name: Run backend and ZAP scans
        env:
          ZAP_TARGET: http://127.0.0.1:8000
          ZAP_API_SPEC: http://127.0.0.1:8000/openapi.json
        run: |
          set -euo pipefail

          cd Backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../reports/backend.log 2>&1 &
          backend_pid=$!

          cleanup() {
            kill "$backend_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error "$ZAP_API_SPEC" > /dev/null; then
              break
            fi
            sleep 2
          done

          curl --fail --silent --show-error "$ZAP_TARGET" > /dev/null
          curl --fail --silent --show-error "$ZAP_API_SPEC" > /dev/null

          cd "$GITHUB_WORKSPACE"

          set +e
          docker run --rm --network host -v "$PWD:/zap/wrk" \
            zaproxy/zap-stable zap-full-scan.py \
            -t "$ZAP_TARGET" \
            -c gen.conf \
            -r reports/zap-full-report.html \
            -J reports/zap-full-report.json
          full_rc=$?

          docker run --rm --network host -v "$PWD:/zap/wrk" \
            zaproxy/zap-stable zap-api-scan.py \
            -t "$ZAP_API_SPEC" \
            -f openapi \
            -c gen.conf \
            -r reports/zap-api-report.html \
            -J reports/zap-api-report.json
          api_rc=$?
          set -e

          printf '%s\n' "$full_rc" > reports/zap-full.exitcode
          printf '%s\n' "$api_rc" > reports/zap-api.exitcode

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: |
            reports/backend.log
            reports/zap-*.html
            reports/zap-*.json
            reports/zap-*.exitcode
          if-no-files-found: error

      - name: Validate DAST execution
        if: always()
        run: |
          set -euo pipefail

          test -f reports/zap-full-report.json
          test -f reports/zap-api-report.json

          full_rc=$(cat reports/zap-full.exitcode)
          api_rc=$(cat reports/zap-api.exitcode)

          for rc in "$full_rc" "$api_rc"; do
            if [ "$rc" -gt 2 ]; then
              echo "ZAP scan execution failed with exit code $rc"
              exit 1
            fi
          done

  security_gate:
    needs:
      - sast
      - sca
      - dast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Download SAST reports
        uses: actions/download-artifact@v4
        with:
          name: sast-reports
          path: reports

      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports

      - name: Download DAST reports
        uses: actions/download-artifact@v4
        with:
          name: dast-reports
          path: reports

      - name: Evaluate findings
        run: |
          python scripts/security_gate.py \
            --bandit reports/bandit.json \
            --eslint reports/eslint.json \
            --semgrep reports/semgrep.json \
            --policy security_policy.yaml \
            --zap reports/zap-full-report.json \
            --zap reports/zap-api-report.json \
            --trivy reports/trivy-backend-fs.json \
            --trivy reports/trivy-frontend-fs.json
